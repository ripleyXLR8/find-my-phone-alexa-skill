name: Build and Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
    # Ne déclenche pas le build pour des changements mineurs de doc
    paths-ignore:
      - 'README.md'
      - 'unraid-templates/**'
      - 'find-my-phone-icon.png'
      - '.gitignore'
env:
  REGISTRY: ghcr.io
  # Utilise le nom du dépôt (ex: ripleyxlr8/find-my-phone-alexa-skill)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Nécessaire pour pousser sur GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Buildx est requis pour utiliser le cache type=gha
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache intelligent : évite de réinstaller Chromium/Selenium à chaque fois
          cache-from: type=gha
          cache-to: type=gha,mode=max
